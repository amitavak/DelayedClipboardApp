name: Build and Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish self-contained exe
        run: dotnet publish -c Release -r win-x64 --self-contained -p:PublishSingleFile=true

      - name: Update latest release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release delete latest --cleanup-tag --yes 2>/dev/null || true
          gh release create latest \
            --title "Latest Build" \
            --notes "Auto-generated from the latest master branch commit. Self-contained — no .NET runtime required." \
            "bin/Release/net9.0-windows/win-x64/publish/DelayedClipboardApp.exe"
